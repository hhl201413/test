name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    # ubuntu-latest 已是 24.04，缺少 libtinfo5 等包会导致 apt 退出码 100
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    defaults:
      run:
        working-directory: 签到/android_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev fonts-noto-cjk

      - name: Prepare Chinese font
        run: |
          mkdir -p fonts
          FONT=$(find /usr/share/fonts -iname '*NotoSansCJK*' -o -iname '*NotoSansSC*' | head -1)
          if [ -n "$FONT" ]; then
            cp "$FONT" fonts/noto.ttc
            echo "Using font: $FONT"
          else
            echo "Warning: no CJK font found"
          fi

      - name: Install buildozer
        run: |
          python3 -m pip install --user -U pip buildozer cython
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: 签到/android_app/.buildozer
          key: buildozer-${{ hashFiles('签到/android_app/buildozer.spec') }}
          restore-keys: |
            buildozer-

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: 0
        run: buildozer -v android debug

      - name: List output
        run: ls -lh bin/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: moyihelper-apk
          path: 签到/android_app/bin/*.apk
          if-no-files-found: error
