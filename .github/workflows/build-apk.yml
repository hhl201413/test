name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    defaults:
      run:
        working-directory: 签到/android_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential git zip unzip openjdk-17-jdk \
            python3 python3-dev python3-pip python3-venv \
            autoconf automake libtool pkg-config ccache \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libjpeg-dev libpng-dev libfreetype6-dev \
            libavformat-dev libavcodec-dev libswscale-dev \
            fonts-noto-cjk

      - name: Prepare Chinese font
        run: |
          mkdir -p fonts
          FONT=$(find /usr/share/fonts -iname '*NotoSansCJK*' -o -iname '*NotoSansSC*' | head -1)
          if [ -n "$FONT" ]; then
            cp "$FONT" fonts/noto.ttc
            echo "Using font: $FONT"
          else
            echo "Warning: no CJK font found"
          fi

      - name: Install buildozer
        run: |
          python3 -m pip install --user -U pip
          python3 -m pip install --user "cython==0.29.36" buildozer
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          buildozer --version
          cython --version

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: 签到/android_app/.buildozer
          key: buildozer-v3-${{ hashFiles('签到/android_app/buildozer.spec') }}
          restore-keys: |
            buildozer-v3-

      - name: Build APK
        run: |
          set -o pipefail
          export BUILDOZER_WARN_ON_ROOT=0
          rm -rf .buildozer/android/platform/python-for-android
          buildozer -v android debug 2>&1 | tee build.log

      - name: Show log tail on failure
        if: failure()
        run: |
          echo "========== build.log (last 150 lines) =========="
          tail -n 150 build.log || true
          echo "========== .buildozer logs =========="
          find .buildozer -name "*.txt" -o -name "*.log" 2>/dev/null | head -20
          find .buildozer -name "*.txt" -exec tail -n 30 {} \; 2>/dev/null | tail -n 100 || true

      - name: List output
        run: ls -lh bin/ || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: moyihelper-apk
          path: 签到/android_app/bin/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: 签到/android_app/build.log
