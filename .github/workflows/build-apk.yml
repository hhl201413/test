name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    defaults:
      run:
        working-directory: 签到/android_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential git zip unzip openjdk-17-jdk \
            python3 python3-pip python3-venv python3-dev \
            autoconf automake libtool pkg-config ccache \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libjpeg-dev libpng-dev libfreetype6-dev \
            libavformat-dev libavcodec-dev libswscale-dev \
            fonts-noto-cjk patchelf

      - name: Prepare Chinese font
        run: |
          mkdir -p fonts
          FONT=$(find /usr/share/fonts -iname '*NotoSansCJK*' -o -iname '*NotoSansSC*' | head -1)
          if [ -n "$FONT" ]; then
            cp "$FONT" fonts/noto.ttc
            echo "Using font: $FONT"
          fi

      - name: Install buildozer
        run: |
          python3 --version
          python3 -m pip install --user -U pip
          python3 -m pip install --user "cython==0.29.36" "buildozer==1.5.0"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          buildozer --version

      - name: Cache Android SDK and NDK only
        uses: actions/cache@v4
        with:
          path: 签到/android_app/.buildozer/android/platform/android-sdk
          key: android-sdk-v2-${{ hashFiles('签到/android_app/buildozer.spec') }}
          restore-keys: android-sdk-v2-

      - name: Build APK
        run: |
          set -o pipefail
          export BUILDOZER_WARN_ON_ROOT=0
          # 清除全局/本地缓存，避免 hostpython3 沿用旧版 Python 3.14
          rm -rf "$HOME/.buildozer"
          rm -rf .buildozer/android/platform/python-for-android
          rm -rf .buildozer/android/platform/build-arm64-v8a
          rm -rf .buildozer/android/platform/android-ndk-r28c
          python3 --version
          buildozer -v android debug 2>&1 | tee build.log

      - name: Show log tail on failure
        if: failure()
        run: |
          echo "=== Errors in build.log ==="
          grep -nE '\[ERROR\]|ERROR:|Command failed|Traceback|Build failed' build.log | tail -40 || true
          echo "=== Last 200 lines ==="
          tail -n 200 build.log || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: moyihelper-apk
          path: 签到/android_app/bin/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: 签到/android_app/build.log
