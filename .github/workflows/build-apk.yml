name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    defaults:
      run:
        working-directory: 签到/android_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.12'

      - name: Pin python3 for python-for-android
        run: |
          PY310="$(command -v python)"
          python --version
          sudo ln -sf "$PY310" /usr/bin/python3
          python3 --version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config ccache \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libjpeg-dev libpng-dev libfreetype6-dev \
            libavformat-dev libavcodec-dev libswscale-dev \
            fonts-noto-cjk

      - name: Prepare Chinese font
        run: |
          mkdir -p fonts
          FONT=$(find /usr/share/fonts -iname '*NotoSansCJK*' -o -iname '*NotoSansSC*' | head -1)
          if [ -n "$FONT" ]; then
            cp "$FONT" fonts/noto.ttc
            echo "Using font: $FONT"
          fi

      - name: Install buildozer 1.4.0
        run: |
          python -m pip install --user -U pip
          python -m pip install --user "cython==0.29.36" "buildozer==1.4.0"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          python3 --version
          buildozer --version

      - name: Cache Android SDK and NDK only
        uses: actions/cache@v4
        with:
          path: 签到/android_app/.buildozer/android/platform/android-sdk
          key: android-sdk-v2-${{ hashFiles('签到/android_app/buildozer.spec') }}
          restore-keys: android-sdk-v2-

      - name: Build APK
        run: |
          set -o pipefail
          export BUILDOZER_WARN_ON_ROOT=0
          rm -rf .buildozer/android/platform/python-for-android
          rm -rf .buildozer/android/platform/build-arm64-v8a
          buildozer -v android debug 2>&1 | tee build.log

      - name: Show log tail on failure
        if: failure()
        run: tail -n 150 build.log || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: moyihelper-apk
          path: 签到/android_app/bin/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: 签到/android_app/build.log
